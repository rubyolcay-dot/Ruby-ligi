name: Lichess Veri Guncelleme
on:
  schedule:
    - cron: '0 */6 * * *' # 6 saatte bir otomatik çalışır
  workflow_dispatch: # İstediğin an elinle de çalıştırabilmen için

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Lichess Verilerini Isle
        run: |
          import requests
          import json
          
          # Lichess API'sinden takımı çekiyoruz
          res = requests.get('https://lichess.org/api/team/ruby-satranc/users')
          lines = res.text.strip().split('\n')
          users = [json.loads(l) for l in lines if l]
          
          # Eğer eski veri varsa, değişim hesaplamak için hafızaya alıyoruz
          try:
              with open('data.json', 'r') as f:
                  old_data = json.load(f)
              old_ratings = {u['name']: u['rating'] for u in old_data.get('blitz', [])}
          except:
              old_ratings = {}
              
          # Blitz sıralaması ve 6 saatlik fark hesabı
          blitz_list = []
          for u in users:
              if 'perfs' in u and 'blitz' in u['perfs']:
                  name = u['username']
                  current = u['perfs']['blitz']['rating']
                  change = current - old_ratings.get(name, current)
                  blitz_list.append({'name': name, 'rating': current, 'change': change})
          blitz_list.sort(key=lambda x: x['rating'], reverse=True)
          
          # Toplam maç sayısına göre sıralama
          games_list = []
          for u in users:
              if 'count' in u and 'all' in u['count']:
                  games_list.append({'name': u['username'], 'count': u['count']['all']})
          games_list.sort(key=lambda x: x['count'], reverse=True)
          
          # Sonuçları data.json dosyasına yazıyoruz
          new_data = {'blitz': blitz_list, 'games': games_list}
          with open('data.json', 'w') as f:
              json.dump(new_data, f, indent=2)

      - name: Degisiklikleri Githuba Yukle
        run: |
          git config --global user.name 'Lichess Bot'
          git config --global user.email 'bot@lichess.com'
          git add data.json
          git commit -m "Lichess verileri guncellendi" || exit 0
          git push
