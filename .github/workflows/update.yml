      - name: Verileri Çek ve İşle
        run: |
          python -c "
          import urllib.request
          import json
          import time

          TEAM_ID = 'ruby-satranc'
          
          # 1. Takım üyelerini çek
          members_url = f'https://lichess.org/api/team/{TEAM_ID}/users'
          req = urllib.request.Request(members_url, headers={'User-Agent': 'Mozilla/5.0'})
          
          blitz_data = []
          games_data = []
          
          try:
              with urllib.request.urlopen(req) as response:
                  # Lichess her satırda bir kullanıcı objesi gönderir (NDJSON)
                  for line in response:
                      if not line.strip():
                          continue
                      user = json.loads(line.decode('utf-8'))
                      username = user.get('username')
                      
                      # Kullanıcının detaylı profilini çek (Reyting ve Maç sayısı için)
                      user_url = f'https://lichess.org/api/user/{username}'
                      user_req = urllib.request.Request(user_url, headers={'User-Agent': 'Mozilla/5.0'})
                      
                      try:
                          with urllib.request.urlopen(user_req) as u_resp:
                              u_data = json.loads(u_resp.read().decode('utf-8'))
                              
                              # Blitz Bilgileri
                              blitz = u_data.get('perfs', {}).get('blitz', {})
                              blitz_rating = blitz.get('rating', 0)
                              # Eğer hiç maç yapmadıysa 1500 başlangıç puanını sıfır saymasın veya listeye eklesin
                              
                              # Toplam Maç Sayısı
                              total_games = u_data.get('count', {}).get('all', 0)
                              
                              blitz_data.append({'username': username, 'rating': blitz_rating})
                              games_data.append({'username': username, 'games': total_games})
                              
                              print(f'Eklendi: {username} - Blitz: {blitz_rating}, Maç: {total_games}')
                      except Exception as e:
                          print(f'{username} profili çekilemedi: {e}')
                      
                      time.sleep(1) # Lichess engel yememek için 1 saniye bekle
                      
          except Exception as e:
              print(f'Takım üyeleri alınamadı: {e}')

          # Puanlara göre büyükten küçüğe sırala
          blitz_data.sort(key=lambda x: x['rating'], reverse=True)
          games_data.sort(key=lambda x: x['games'], reverse=True)

          output = {
              'blitz': blitz_data,
              'games': games_data
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          "
