name: Lichess Veri Guncelleme

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Saatte bir otomatik çalışır

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verileri Cek ve Isle
        run: |
          python -c "
          import urllib.request
          import json
          import time

          TEAM_ID = 'ruby-satranc'
          members_url = f'https://lichess.org/api/team/{TEAM_ID}/users'
          req = urllib.request.Request(members_url, headers={'User-Agent': 'Mozilla/5.0'})
          
          blitz_data = []
          games_data = []
          
          try:
              with urllib.request.urlopen(req) as response:
                  for line in response:
                      if not line.strip():
                          continue
                      user = json.loads(line.decode('utf-8'))
                      username = user.get('username')
                      
                      user_url = f'https://lichess.org/api/user/{username}'
                      user_req = urllib.request.Request(user_url, headers={'User-Agent': 'Mozilla/5.0'})
                      
                      try:
                          with urllib.request.urlopen(user_req) as u_resp:
                              u_data = json.loads(u_resp.read().decode('utf-8'))
                              blitz = u_data.get('perfs', {}).get('blitz', {})
                              blitz_rating = blitz.get('rating', 0)
                              total_games = u_data.get('count', {}).get('all', 0)
                              
                              blitz_data.append({'username': username, 'rating': blitz_rating})
                              games_data.append({'username': username, 'games': total_games})
                              print(f'Eklendi: {username}')
                      except Exception as e:
                          print(f'{username} hatası: {e}')
                      
                      time.sleep(1)
          except Exception as e:
              print(f'Takim hatasi: {e}')

          blitz_data.sort(key=lambda x: x['rating'], reverse=True)
          games_data.sort(key=lambda x: x['games'], reverse=True)

          output = {'blitz': blitz_data, 'games': games_data}
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          "

      - name: Degisiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Veriler güncellendi" && git push)
