<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Satranç Ligi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #161512; color: #bababa; margin: 0; padding: 15px; }
        h2 { text-align: center; color: #ffffff; }
        .tabs { display: flex; background-color: #262421; border-radius: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: none; border: none; color: #bababa; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background-color: #363431; color: #ffffff; border-bottom: 3px solid #629924; }
        .tab-content { display: none; background-color: #262421; padding: 15px; border-radius: 8px; }
        .tab-content.active { display: block; }
        .player-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #363431; }
        .rank { width: 35px; font-weight: bold; color: #d4a017; }
        .username { flex: 1; font-weight: bold; color: #ffffff; }
        .score-box { text-align: right; }
        .score { font-size: 16px; font-weight: bold; color: #ffffff; }
        .change { font-size: 12px; font-weight: bold; margin-left: 5px; }
        .green { color: #629924; }
        .red { color: #c33; }
        .gray { color: #666; }
    </style>
</head>
<body>
    <h2>♟️ Ruby Satranç Ligi</h2>
    <div class="tabs">
        <button id="btn-blitz" class="tab-btn active" onclick="switchTab('blitz')">⚡ Blitz Puanı</button>
        <button id="btn-games" class="tab-btn" onclick="switchTab('games')">🔥 En Çok Maç</button>
    </div>
    <div id="blitz" class="tab-content active"><div id="blitz-list"></div></div>
    <div id="games" class="tab-content"><div id="games-list"></div></div>

    <script>
        function switchTab(tabId) {
            document.getElementById('blitz').classList.remove('active');
            document.getElementById('games').classList.remove('active');
            document.getElementById('btn-blitz').classList.remove('active');
            document.getElementById('btn-games').classList.remove('active');
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                
                let blitzHtml = '';
                data.blitz.forEach((u, i) => {
                    let change = u.change > 0 ? `<span class="change green">(+${u.change})</span>` : (u.change < 0 ? `<span class="change red">(${u.change})</span>` : '<span class="change gray">(0)</span>');
                    blitzHtml += `<div class="player-row"><div class="rank">${i + 1}.</div><div class="username">${u.name}</div><div class="score-box"><span class="score">${u.rating}</span>${change}</div></div>`;
                });
                document.getElementById('blitz-list').innerHTML = blitzHtml;

                let gamesHtml = '';
                data.games.forEach((u, i) => {
                    gamesHtml += `<div class="player-row"><div class="rank">${i + 1}.</div><div class="username">${u.name}</div><div class="score-box"><span class="score">${u.count} Maç</span></div></div>`;
                });
                document.getElementById('games-list').innerHTML = gamesHtml;
            } catch(e) {
                document.getElementById('blitz-list').innerHTML = "Veriler yükleniyor, lütfen bekleyin...";
            }
        }
        init();
    </script>
</body>
</html>
