<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby League - Ezeli Rekabetler</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #ff4757; }
        .info { color: #888; font-size: 14px; margin-bottom: 30px; }
        .card {
            background: #1e272e;
            border-radius: 12px;
            padding: 15px;
            margin: 15px auto;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ff4757;
        }
        .player { font-weight: bold; font-size: 18px; width: 40%; }
        .score { font-size: 24px; font-weight: 900; color: #ffdd59; }
        .vs { font-size: 12px; color: #aaa; margin: 0 10px; }
        .total { font-size: 12px; color: #0fb9b1; margin-top: 5px; }
        .player-left { text-align: right; }
        .player-right { text-align: left; }
        #loading { color: #ffa502; font-size: 18px; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>⚔️ EZELİ REKABETLER ⚔️</h1>
    <p class="info">Sistem her 30 dakikada bir yeni maç geçmişlerini tarayarak bu listeyi otomatik büyütür.</p>

    <div id="loading">Tarama devam ediyor, veriler yükleniyor...</div>
    <div id="rivalries-container"></div>

    <script>
        // Sadece rivalries.json dosyasını okuyan tertemiz kod
        fetch('rivalries.json?v=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error("Veri henüz oluşmadı");
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('rivalries-container');
                
                if(data.length === 0) {
                    container.innerHTML = "<p style='color:#888'>Henüz rekabet bulunamadı. Sistem arka planda arıyor...</p>";
                    return;
                }

                data.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="player player-left">${match.player1}</div>
                        <div style="text-align:center">
                            <span class="score">${match.score1} - ${match.score2}</span>
                            <div class="total">${match.totalMatches} Maç</div>
                        </div>
                        <div class="player player-right">${match.player2}</div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById('loading').innerText = "İlk taramanın bitmesi bekleniyor... Lütfen 5-10 dakika sonra sayfayı yenileyin.";
            });
    </script>
</body>
</html>
